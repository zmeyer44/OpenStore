<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Locker</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      html,
      body {
        margin: 0;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        width: 360px;
        background: #f7f7f5;
        color: #14110f;
        -webkit-font-smoothing: antialiased;
      }
      button {
        font-family: inherit;
      }
      .locker-spin {
        animation: locker-spin 0.8s linear infinite;
      }
      @keyframes locker-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
